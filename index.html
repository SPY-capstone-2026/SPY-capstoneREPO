<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPY-capstoneREPO</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }
    img {
      max-width: 100%;
    }
    pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }
    code {
      background: #f6f8fa;
      padding: 2px 4px;
      border-radius: 4px;
    }
    a {
      color: #0969da;
    }
  </style>
</head>
<body>
  <div id="content">로딩 중...</div>

  <script>
    fetch('./README.md')
      .then(response => response.text())
      .then(markdown => {
        document.getElementById('content').innerHTML = marked.parse(markdown);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>README.md를 불러오지 못했습니다.</p>';
      });
  </script>
</body>
</html>
